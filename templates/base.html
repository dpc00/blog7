<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Balance Log</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="tabs">
    <a href="/"             class="{{ 'active' if tab == 'balances' }}">Balances</a>
    <a href="/calcs"        class="{{ 'active' if tab == 'calcs' }}">Calcs</a>
    <a href="/transactions" class="{{ 'active' if tab == 'transactions' }}">Transactions</a>
    <a href="/daily"        class="{{ 'active' if tab == 'daily' }}">Daily</a>
    <a href="/weekly"       class="{{ 'active' if tab == 'weekly' }}">Weekly</a>
    <a href="/monthly"      class="{{ 'active' if tab == 'monthly' }}">Monthly</a>
    <a href="/yearly"       class="{{ 'active' if tab == 'yearly' }}">Yearly</a>
  </nav>
  <div class="content">
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var tbl = document.querySelector('table');
  if (!tbl) return;
  var hdr = tbl.querySelector('tr');
  if (!hdr) return;
  var TAB_H = document.querySelector('.tabs').offsetHeight;

  var fixDiv = document.createElement('div');
  fixDiv.style.cssText = 'position:fixed;top:'+TAB_H+'px;left:0;right:0;overflow:hidden;background:#fff;z-index:5;display:none;border-bottom:2px solid #ddd;';
  var fixTbl = document.createElement('table');
  fixTbl.style.cssText = 'border-collapse:separate;border-spacing:0;font-size:12px;white-space:nowrap;';
  fixTbl.appendChild(hdr.cloneNode(true));
  fixDiv.appendChild(fixTbl);
  document.body.appendChild(fixDiv);

  function sync() {
    fixTbl.style.transform = 'translateX('+tbl.getBoundingClientRect().left+'px)';
  }
  function update() {
    if (hdr.getBoundingClientRect().bottom < TAB_H) {
      fixDiv.style.display = 'block'; sync();
    } else {
      fixDiv.style.display = 'none';
    }
  }
  window.addEventListener('scroll', update);
  var wrap = tbl.closest('.tbl-wrap');
  if (wrap) wrap.addEventListener('scroll', function() { if (fixDiv.style.display!='none') sync(); });
});
</script>
</body>
</html>
