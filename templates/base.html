<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Balance Log</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ css_v }}">
</head>
<body>
  <nav class="tabs">
    <a href="/"             class="{{ 'active' if tab == 'balances' }}">Balances</a>
    <a href="/calcs"        class="{{ 'active' if tab == 'calcs' }}">Calcs</a>
    <a href="/transactions" class="{{ 'active' if tab == 'transactions' }}">Transactions</a>
    <a href="/daily"        class="{{ 'active' if tab == 'daily' }}">Daily</a>
    <a href="/weekly"       class="{{ 'active' if tab == 'weekly' }}">Weekly</a>
    <a href="/monthly"      class="{{ 'active' if tab == 'monthly' }}">Monthly</a>
    <a href="/yearly"       class="{{ 'active' if tab == 'yearly' }}">Yearly</a>
  </nav>
  <div class="content">
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script>
    (() => {
      const tabs = document.querySelector('.tabs');
      if (!tabs) return;
      const setTabsHeight = () => {
        document.documentElement.style.setProperty('--tabs-height', `${tabs.offsetHeight}px`);
      };
      setTabsHeight();
      window.addEventListener('resize', setTabsHeight);
    })();
  </script>
</body>
</html>
