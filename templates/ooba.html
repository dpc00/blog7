{% extends "base.html" %}
{% block content %}
<div class="login-form">
  <h2>One-Time Code</h2>
  <p style="color:#e65100; font-size:13px; margin-bottom:12px;">
    A one-time code was sent to your phone or email.
  </p>
  <form method="post" action="/ooba">
    <div class="field-row">
      <label>Code</label>
      <input type="text" name="code" autofocus autocomplete="one-time-code"
             inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-indigo" type="submit">Verify</button>
      <a class="btn btn-grey" href="/">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
